version: '3.8'

services:
  asr-service:
    build:
      context: ./ai-services/asr
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./ai-services/asr:/app
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  face-service:
    build:
      context: ./ai-services/face
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./ai-services/face:/app
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  tts-service:
    build:
      context: ./ai-services/tts
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./ai-services/tts:/app
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
